# ============================================================
# etcd-manager Helm chart values
# ============================================================
# Default account: admin / admin123  (change password after first boot)
# Docs:             https://github.com/dysodeng/etcd-manager
# ------------------------------------------------------------

# -- Override the chart name (used in all resource names + DNS).
nameOverride: ""
# -- Fully qualified app name (when non-empty, takes precedence).
fullnameOverride: ""

# -- Number of replicas for the backend / frontend.
#    Backend is stateless once you switch to PostgreSQL; with the default
#    SQLite backend keep this at 1 (a SQLite file is not multi-writer safe).
replicaCount: 1

imagePullSecrets: []

# ------------------------------------------------------------
# Image registry
# ------------------------------------------------------------
global:
  # -- Global image registry prefix, e.g. "registry.i.huaxisy.com/library".
  #    Each image field below will be prefixed with this value when set.
  imageRegistry: ""

# ------------------------------------------------------------
# Backend (Go API server)
# ------------------------------------------------------------
backend:
  image:
    # -- Backend image repository (without registry prefix).
    repository: etcd-manager-backend
    tag: ""
    # -- Overrides the image tag; defaults to Chart appVersion.
    pullPolicy: IfNotPresent

  service:
    type: ClusterIP
    port: 8080

  # -- Resource requests/limits for the backend Pod.
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 512Mi

  # -- Config file mounted at /app/configs/config.yaml.
  #    Sensitive fields (jwt.secret, etcd.username/password, db dsn) are
  #    populated from env vars by viper (see values.backend.env), but they
  #    are also kept here for completeness.
  config:
    server:
      port: 8080
    etcd:
      endpoints:
        # Comma-separated list when overridden via ETCD_ENDPOINTS env.
        - "127.0.0.1:2379"
      username: ""
      password: ""
      tls:
        enabled: false
        cert_file: ""
        key_file: ""
        ca_file: ""
    database:
      # sqlite | postgres
      driver: "sqlite"
      path: "./data/data.db"
      # dsn: "host=... port=5432 user=... password=... dbname=etcd_manager sslmode=disable TimeZone=Asia/Shanghai"
    jwt:
      secret: "change-me-in-production"
      expire_hours: 24
    log:
      level: "info"

  # -- Environment variables (override the YAML config via viper.BindEnv).
  #    Keep secrets out of here in production — use `envFrom` secret refs.
  env:
    TZ: Asia/Shanghai
    # CONFIG_PATH is fixed by the Dockerfile; do not override.
    # JWT_SECRET: ""
    # ETCD_ENDPOINTS: ""
    # ETCD_USERNAME: ""
    # ETCD_PASSWORD: ""
    # DB_DRIVER: ""
    # DB_DSN: ""

  # -- Load additional env (e.g. from an existing Secret).
  envFrom: []

  # -- Persistent volume for /app/data (SQLite db, audit logs).
  persistence:
    enabled: true
    storageClass: ""
    accessMode: ReadWriteOnce
    size: 5Gi
    # existingClaim: ""

  podSecurityContext:
    fsGroup: 1000

  securityContext:
    runAsNonRoot: true
    runAsUser: 1000
    readOnlyRootFilesystem: false
    allowPrivilegeEscalation: false

  nodeSelector: {}
  tolerations: []
  affinity: {}
  podAnnotations: {}
  podLabels: {}
  # -- Backend has no unauthenticated HTTP endpoint (all routes sit behind
  #    the JWT middleware), so probes use a TCP check on the http port.
  #    If you later add a public /health endpoint, switch back to httpGet.
  livenessProbe:
    tcpSocket:
      port: http
    initialDelaySeconds: 15
    periodSeconds: 20
    failureThreshold: 5
  readinessProbe:
    tcpSocket:
      port: http
    initialDelaySeconds: 5
    periodSeconds: 10

# ------------------------------------------------------------
# Frontend (nginx static SPA)
# ------------------------------------------------------------
frontend:
  image:
    # -- Frontend image repository (without registry prefix).
    repository: etcd-manager-frontend
    tag: ""
    pullPolicy: IfNotPresent

  service:
    type: ClusterIP
    port: 80

  resources:
    requests:
      cpu: 50m
      memory: 32Mi
    limits:
      cpu: 200m
      memory: 128Mi

  # NOTE: the upstream nginx:alpine image writes to /var/cache/nginx and
  # /var/run (both owned by root), so it cannot run non-root out of the box.
  # We allow root to match the original docker-compose behaviour. To harden,
  # either switch to nginxinc/nginx-unprivileged or chown those dirs in the
  # Dockerfile, then re-enable runAsNonRoot/runAsUser here.
  podSecurityContext: {}
  securityContext: {}

  nodeSelector: {}
  tolerations: []
  affinity: {}
  podAnnotations: {}
  podLabels: {}
  livenessProbe:
    httpGet:
      path: /
      port: http
    initialDelaySeconds: 10
    periodSeconds: 20
  readinessProbe:
    httpGet:
      path: /
      port: http
    initialDelaySeconds: 5
    periodSeconds: 10

# ------------------------------------------------------------
# ServiceAccount
# ------------------------------------------------------------
serviceAccount:
  # -- Create a dedicated ServiceAccount.
  create: true
  # -- Name (generated when empty).
  name: ""
  annotations: {}
  automount: true

# ------------------------------------------------------------
# Ingress
#   Frontend SPA is served from "/", API from "/api" and SSE
#   long-connection from "/watch". Both must route to backend.
# ------------------------------------------------------------
ingress:
  enabled: false
  className: "nginx"
  annotations: {}
    # kubernetes.io/ingress.class: nginx
    # cert-manager.io/cluster-issuer: letsencrypt-prod
  hosts:
    - host: etcd-manager.local
      paths:
        - path: /
          pathType: Prefix
          service: frontend
          port: http
        - path: /api
          pathType: Prefix
          service: backend
          port: http
        - path: /watch
          pathType: Prefix
          service: backend
          port: http
  tls: []
    # - secretName: etcd-manager-tls
    #   hosts:
    #     - etcd-manager.local

# ------------------------------------------------------------
# Optional: bundled etcd cluster
#   Set enabled=true to bootstrap a 3-node etcd cluster in the same
#   release (mirrors docker/etcd-cluster/docker-compose.yaml). For
#   production use the official etcd helm chart or Bitnami instead.
# ------------------------------------------------------------
etcd:
  enabled: false
  image:
    repository: bitnami/etcd
    tag: "3.5.5"
    pullPolicy: IfNotPresent
  replicaCount: 3
  token: "etcd-cluster-token"
  autoCompactionRetention: "1"
  maxRequestBytes: "10485760"
  quotaBackendBytes: "8589934592"
  persistence:
    enabled: true
    storageClass: ""
    size: 8Gi
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: 1
      memory: 1Gi
  service:
    type: ClusterIP
    clientPort: 2379
    peerPort: 2380
  podSecurityContext:
    fsGroup: 1001
  securityContext:
    runAsUser: 1001
