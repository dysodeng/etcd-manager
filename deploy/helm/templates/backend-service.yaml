apiVersion: v1
kind: Service
metadata:
  name: {{ include "etcd-manager.backend.fullname" . | quote }}
  labels:
    {{- include "etcd-manager.labels" . | nindent 4 }}
    app.kubernetes.io/component: backend
spec:
  type: {{ .Values.backend.service.type }}
  ports:
    - name: http
      port: {{ .Values.backend.service.port }}
      targetPort: http
      protocol: TCP
  selector:
    {{- include "etcd-manager.backendSelectorLabels" . | nindent 4 }}
