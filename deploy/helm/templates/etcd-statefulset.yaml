{{- if .Values.etcd.enabled -}}
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: {{ include "etcd-manager.etcd.fullname" . | quote }}
  labels:
    {{- include "etcd-manager.labels" . | nindent 4 }}
    app.kubernetes.io/component: etcd
spec:
  serviceName: {{ include "etcd-manager.etcd.fullname" . | quote }}
  replicas: {{ .Values.etcd.replicaCount }}
  podManagementPolicy: Parallel
  selector:
    matchLabels:
      app.kubernetes.io/name: {{ include "etcd-manager.name" . }}
      app.kubernetes.io/instance: {{ .Release.Name }}
      app.kubernetes.io/component: etcd
  template:
    metadata:
      labels:
        app.kubernetes.io/name: {{ include "etcd-manager.name" . }}
        app.kubernetes.io/instance: {{ .Release.Name }}
        app.kubernetes.io/component: etcd
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.etcd.podSecurityContext }}
      securityContext:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: etcd
          image: {{ include "etcd-manager.image" (dict "ctx" . "image" .Values.etcd.image) | quote }}
          imagePullPolicy: {{ .Values.etcd.image.pullPolicy }}
          {{- with .Values.etcd.securityContext }}
          securityContext:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          ports:
            - name: client
              containerPort: 2379
              protocol: TCP
            - name: peer
              containerPort: 2380
              protocol: TCP
          env:
            # Pod name is required to build the per-pod peer/client URLs.
            - name: POD_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            - name: POD_NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
            - name: ETCD_NAME
              value: "$(POD_NAME)"
          command:
            - etcd
            - --data-dir=/var/lib/etcd
            - --listen-client-urls=http://0.0.0.0:2379
            - --listen-peer-urls=http://0.0.0.0:2380
            - --advertise-client-urls=http://$(POD_NAME).{{ include "etcd-manager.etcd.fullname" . }}.$(POD_NAMESPACE).svc:{{ .Values.etcd.service.clientPort }}
            - --initial-advertise-peer-urls=http://$(POD_NAME).{{ include "etcd-manager.etcd.fullname" . }}.$(POD_NAMESPACE).svc:{{ .Values.etcd.service.peerPort }}
            - --initial-cluster={{ include "etcd-manager.etcd.initialCluster" . }}
            - --initial-cluster-token={{ .Values.etcd.token | quote }}
            - --initial-cluster-state=new
            - --auto-compaction-retention={{ .Values.etcd.autoCompactionRetention | quote }}
            - --max-request-bytes={{ .Values.etcd.maxRequestBytes | quote }}
            - --quota-backend-bytes={{ .Values.etcd.quotaBackendBytes | quote }}
          volumeMounts:
            {{- if .Values.etcd.persistence.enabled }}
            - name: data
              mountPath: /var/lib/etcd
            {{- end }}
          {{- with .Values.etcd.resources }}
          resources:
            {{- toYaml . | nindent 12 }}
          {{- end }}
  {{- if .Values.etcd.persistence.enabled }}
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        accessModes:
          - ReadWriteOnce
        resources:
          requests:
            storage: {{ .Values.etcd.persistence.size | quote }}
        {{- with .Values.etcd.persistence.storageClass }}
        {{- if (eq "-" .) }}
        storageClassName: ""
        {{- else }}
        storageClassName: {{ . | quote }}
        {{- end }}
        {{- end }}
  {{- end }}
{{- end -}}
