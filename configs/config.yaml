server:
  port: 8080

etcd:
  endpoints:
    - "localhost:2379"
  username: ""
  password: ""
  tls:
    enabled: false
    cert_file: ""
    key_file: ""
    ca_file: ""

database:
  driver: "postgres"  # sqlite 或 postgres
  # SQLite 配置
  #path: "./data/config-center.db"
  # PostgreSQL 配置 (driver 为 postgres 时使用)
  dsn: "host=localhost port=5432 user=postgres password=123456 dbname=config_center sslmode=disable"

jwt:
  secret: "change-me-in-production"
  expire_hours: 24

log:
  level: "info"
