server:
  port: 8080

etcd:
  endpoints:
    - "127.0.0.1:2379"
  username: ""
  password: ""
  tls:
    enabled: false
    cert_file: ""
    key_file: ""
    ca_file: ""

database:
  driver: "sqlite"  # sqlite 或 postgres
  # SQLite 配置
  path: "./data/data.db"
  # PostgreSQL 配置 (driver 为 postgres 时使用)
  # dsn: "host=localhost port=5432 user=postgres password=postgres dbname=config_center sslmode=disable TimeZone=Asia/Shanghai"

jwt:
  secret: "change-me-in-production"
  expire_hours: 24

log:
  level: "info"
