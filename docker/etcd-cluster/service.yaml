apiVersion: v1
kind: Service
metadata:
  name: etcd-headless
  namespace: etcd-cluster
  labels:
    app: etcd
spec:
  clusterIP: None
  publishNotReadyAddresses: true
  ports:
    - name: client
      port: 2379
      targetPort: 2379
    - name: peer
      port: 2380
      targetPort: 2380
  selector:
    app: etcd
---
apiVersion: v1
kind: Service
metadata:
  name: etcd-client
  namespace: etcd-cluster
  labels:
    app: etcd
spec:
  type: ClusterIP
  ports:
    - name: client
      port: 2379
      targetPort: 2379
  selector:
    app: etcd
